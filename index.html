<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Debug Dashboard</title>
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 40px; margin: 0; }
        .container { width: 100%; max-width: 600px; }
        .card { background: var(--card); padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); margin-bottom: 20px; border: 1px solid #334155; }
        
        /* Input & Buttons */
        input { width: calc(100% - 24px); padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { cursor: pointer; padding: 12px; border-radius: 8px; border: none; font-weight: 600; transition: 0.2s; background: var(--primary); color: white; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button.secondary { background: #475569; }

        /* Status & Logs */
        .log-box { background: #000; color: #10b981; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 13px; height: 100px; overflow-y: auto; text-align: left; border: 1px solid #334155; }
        .progress-container { background: #334155; border-radius: 10px; height: 10px; margin: 20px 0; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: var(--primary); transition: width 0.3s; }
        .badge { font-size: 11px; background: #10b981; padding: 3px 8px; border-radius: 10px; vertical-align: middle; margin-left: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>🛠️ Debug Dashboard <span class="badge">v2.0</span></h2>
        <p style="color: #94a3b8;">Testing environment for HTML/JS/CSS</p>
        
        <div class="progress-container"><div id="progress-bar"></div></div>

        <input type="text" id="userInput" placeholder="Kuch type karke check karo...">
        
        <div class="btn-group">
            <button onclick="testInput()">Log Input</button>
            <button class="secondary" onclick="fetchData()">Fetch Mock API</button>
        </div>
    </div>

    <div class="card">
        <h4>Terminal Output</h4>
        <div class="log-box" id="terminal">
            > System ready...<br>
            > Waiting for user action...
        </div>
        <button onclick="clearLogs()" style="margin-top: 15px; width: 100%; background: transparent; border: 1px solid #475569; color: #94a3b8; font-size: 12px;">Clear Logs</button>
    </div>
</div>

<script>
    const terminal = document.getElementById('terminal');
    const progressBar = document.getElementById('progress-bar');

    function log(msg) {
        const time = new Date().toLocaleTimeString().split(' ')[0];
        terminal.innerHTML += `<br>> [${time}] ${msg}`;
        terminal.scrollTop = terminal.scrollHeight;
    }

    function testInput() {
        const val = document.getElementById('userInput').value;
        if(val) {
            log(`Input received: "${val}"`);
            updateProgress(Math.random() * 100);
        } else {
            log("⚠️ Please type something first!");
        }
    }

    function updateProgress(val) {
        progressBar.style.width = val + "%";
    }

    async function fetchData() {
        log("🛰️ Fetching from JSONPlaceholder...");
        updateProgress(30);
        try {
            const response = await fetch('https://jsonplaceholder.typicode.com/todos/1');
            const data = await response.json();
            updateProgress(100);
            log(`✅ Success: Found item "${data.title}"`);
        } catch (error) {
            log("❌ Error fetching data!");
            updateProgress(0);
        }
    }

    function clearLogs() {
        terminal.innerHTML = "> Logs cleared.";
        updateProgress(0);
    }
</script>

</body>
</html>
