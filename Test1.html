<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Testing Page</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --card: white;
            --text: #1c1e21;
        }
        .dark-mode {
            --bg: #18191a;
            --card: #242526;
            --text: #e4e6eb;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            transition: 0.3s;
        }
        .card {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            text-align: center;
            max-width: 400px;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
            font-weight: bold;
        }
        button:hover { background-color: #0056b3; }
        .timestamp { font-size: 0.8rem; opacity: 0.6; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="card">
        <h2 id="title">🚀 Test Environment</h2>
        <p>Everything is running smoothly!</p>
        
        <hr style="opacity: 0.2; margin: 20px 0;">

        <button onclick="showAlert()">Show Alert</button>
        <button onclick="toggleTheme()" style="background-color: #6c757d;">Toggle Dark Mode</button>

        <p class="timestamp">Last Loaded: <span id="time"></span></p>
    </div>

    <script>
        // Display Current Time
        document.getElementById('time').textContent = new Date().toLocaleTimeString();

        // Alert Function
        function showAlert() {
            alert("Button kaam kar raha hai! ✅");
        }

        // Dark Mode Toggle Logic
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const title = document.getElementById('title');
            title.textContent = document.body.classList.contains('dark-mode') ? "🌙 Night Mode" : "🚀 Test Environment";
        }

        console.log("Interactive elements loaded.");
    </script>
</body>
</html>
